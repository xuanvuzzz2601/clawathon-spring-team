<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — zalopay Affiliate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0068ff 0%, #00c2ff 100%); }
    .card { animation: fadeUp .4s ease both; }
    @keyframes fadeUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    input:focus { outline: none; border-color: #0068ff; box-shadow: 0 0 0 3px rgba(0,104,255,.15); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="card bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background:linear-gradient(135deg,#0068ff,#00c2ff)">
        <span class="text-white font-black text-2xl">Z</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">zalopay Affiliate</h1>
      <p class="text-gray-400 text-sm mt-1">Đăng nhập để tiếp tục</p>
    </div>

    <!-- Error -->
    <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600 flex items-center gap-2">
      <i class="fa fa-exclamation-circle"></i>
      <span id="error-text">Sai tên đăng nhập hoặc mật khẩu</span>
    </div>

    <!-- Form -->
    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1.5">Tên đăng nhập</label>
        <input id="username" type="text" placeholder="admin hoặc username của bạn"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm transition" autocomplete="username">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1.5">Mật khẩu</label>
        <div class="relative">
          <input id="password" type="password" placeholder="••••••••"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm pr-12 transition" autocomplete="current-password">
          <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <i class="fa fa-eye" id="eye-icon"></i>
          </button>
        </div>
      </div>
      <button type="submit" id="login-btn"
        class="w-full py-3 rounded-xl text-white font-semibold text-sm transition hover:opacity-90 active:scale-95"
        style="background:linear-gradient(135deg,#0068ff,#00c2ff)">
        <span id="btn-text">Đăng nhập</span>
        <i class="fa fa-spinner fa-spin hidden ml-2" id="btn-spin"></i>
      </button>
    </form>

    <!-- Hint -->
    <div class="mt-6 p-4 bg-gray-50 rounded-xl text-xs text-gray-500 space-y-1">
      <p class="font-semibold text-gray-600 mb-2">Tài khoản demo:</p>
      <div class="flex justify-between"><span>👑 Admin</span><code class="bg-white px-2 py-0.5 rounded">admin / admin123</code></div>
      <div class="flex justify-between"><span>🤝 Affiliate</span><code class="bg-white px-2 py-0.5 rounded">annguyen_fin / affiliate123</code></div>
    </div>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    function togglePwd() {
      const p = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      p.type = p.type === 'password' ? 'text' : 'password';
      icon.className = p.type === 'password' ? 'fa fa-eye' : 'fa fa-eye-slash';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const spin = document.getElementById('btn-spin');
      const errDiv = document.getElementById('error-msg');
      const errText = document.getElementById('error-text');

      if (!username || !password) {
        errText.textContent = 'Vui lòng nhập đầy đủ thông tin';
        errDiv.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      spin.classList.remove('hidden');
      errDiv.classList.add('hidden');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/';
        } else {
          errText.textContent = data.error || 'Đăng nhập thất bại';
          errDiv.classList.remove('hidden');
        }
      } catch {
        errText.textContent = 'Lỗi kết nối, thử lại sau';
        errDiv.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        spin.classList.add('hidden');
      }
    });

    // Enter key
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-form').dispatchEvent(new Event('submit'));
    });
  </script>
</body>
</html>
